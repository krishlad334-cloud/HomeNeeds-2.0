<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .h-circle { fill: #1a3a3a; }
      .h-text { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; }
      .accent-bar { fill: #d8692b; }
    </style>
  </defs>
  
  <!-- Dark teal circle background -->
  <circle cx="12" cy="12" r="11" class="h-circle"/>
  
  <!-- White H text -->
  <text x="12" y="16" text-anchor="middle" class="h-text">H</text>
  
  <!-- Orange accent bar on the left -->
  <rect x="9" y="6" width="2.5" height="12" rx="1" class="accent-bar"/>
</svg>